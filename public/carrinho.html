<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrinho</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="img/logo.png">
</head>
<body>

<header>
  <a href="index.html" style="cursor: pointer; text-decoration: none;">
    <img class="logo-header" src="img/logo.png" alt="Logo">
  </a>

  <nav>
    <a href="index.html">
      <img class="icons-header" src="img/icon-home.png" alt="">
    </a>

    <a href="carrinho.html">
      <img class="icons-header" src="img/icon-carrinho.png" alt="">
    </a>
  </nav>
</header>


<section>
  <div id="lista-container">
    <ul id="lista-carrinho"></ul>
  </div>

  <div id="sidebar" style="display: none;">
    <h3>Itens Selecionados</h3>
    <p id="total-selecionados"></p>
    <button class="btn" onclick="comprarSelecionados()">Comprar</button>
    <button class="btn" onclick="removerSelecionados()">Tirar do carrinho</button>
  </div>

  <div id="acoes-gerais">
    <h2 id="total"></h2>
    <button class="btn" onclick="comprarTodos()">Comprar Todos os Itens</button>
    <button class="btn" onclick="limparCarrinho()">Limpar Carrinho</button>
  </div>
</section>

<script src="js/script.js"></script>
</body>
</html>
